<!DOCTYPE html>
<html>
  <head>
    <title> Crop Art </title>
    <link rel="icon" type="image/png" href="icon.png"/>
    <link href='https://fonts.googleapis.com/css?family=Comfortaa' rel='stylesheet'>
  </head>
  <style>
    body {
      font-family: 'Comfortaa';font-size: 20px;
      cursor: auto;
      background: PaleTurquoise;
    }
    .button {
      background-color: blue;
      border: none;
      border-radius: 4px;
      color: white;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin: 4px 2px;
      cursor: pointer
    }
    .h8 {
      font-size: 8px;
    }
  </style>
  <body>
    <a href="https://titanicspike.github.io"; class = "button">Home</a>
    <p>
      <img src = "crops/Amaranth.png" alt = "Amaranth">Amaranth<img>
    </p>
    <p>
      <img src = "crops/Artichoke.png" alt = "Artichoke">Artichoke<img>
    </p>
    <p>
      <img src = "crops/Beet.png" alt = "Beet">Beet<img>
    </p>
    <p>
      <img src = "crops/Blueberry.png" alt = "Blueberry">Blueberry<img>
    </p>
    <p>
      <img src = "crops/Corn.png" alt = "Corn">Corn<img>
    </p>
    <p>
      <img src = "crops/Wheat.png" alt = "Wheat">Wheat<img>
    </p>
    <p class = "h8"> Photo Credits: Stardew Valley Wiki and Stardew Valley.</p>
    
  </body>
</html>
